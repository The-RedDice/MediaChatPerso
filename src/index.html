<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cacabox Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: transparent !important;
      cursor: none;
    }

    /* ─── Média (vidéo / image) ─── */
    #media-container {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 10;
    }
    #media-container.visible { opacity: 1; }

    #media-video, #media-image {
      border-radius: 12px;
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
      pointer-events: none;
      max-width: calc(var(--media-size, 80) * 1vw);
      max-height: calc(var(--media-size, 80) * 1vh);
      object-fit: contain;
    }
    #media-video { display: block; }
    #media-image { display: none; }

    /* ─── Caption texte sous le média ─── */
    #media-caption {
      margin-top: 14px;
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: clamp(1rem, 2.5vw, 2.5rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
      max-width: 80vw;
      word-break: break-word;
      display: none;
    }
    #media-caption.visible { display: block; }

    /* ─── Infos expéditeur (avatar + pseudo Discord) ─── */
    #sender-info {
      position: fixed;
      top: 24px; right: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 6px 14px 6px 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 30;
    }
    #sender-info.visible { opacity: 1; }
    #sender-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }
    #sender-name {
      font-family: 'Arial', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
    }

    /* ─── Message texte ─── */
    #message-container {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 20;
    }
    #message-container.visible { opacity: 1; }

    #message-text {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: clamp(3rem, var(--text-size, 8vw), 9rem);
      font-weight: 900;
      color: #fff;
      text-align: center;
      text-shadow:
        0 0 20px rgba(255,60,110,1),
        0 0 60px rgba(255,60,110,0.5),
        4px 4px 0 #000, -4px -4px 0 #000,
        4px -4px 0 #000, -4px 4px 0 #000;
      padding: 0 5vw;
      line-height: 1.15;
      animation: msg-bounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      max-width: 90vw;
      word-break: break-word;
    }
    @keyframes msg-bounce {
      from { transform: scale(0.3) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }

    /* ─── Indicateur mute ─── */
    #mute-badge {
      position: fixed;
      bottom: 16px; left: 16px;
      background: rgba(255,60,110,0.85);
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
      padding: 5px 12px;
      border-radius: 8px;
      pointer-events: none;
      display: none;
      z-index: 99;
    }
    #mute-badge.visible { display: block; }

    #audio-player { position: fixed; width: 0; height: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="media-container">
    <div id="sender-info">
      <img id="sender-avatar" alt="">
      <span id="sender-name"></span>
    </div>
    <video id="media-video" autoplay playsinline></video>
    <img   id="media-image" alt="">
    <div id="media-caption"></div>
  </div>

  <div id="message-container">
    <div id="message-text"></div>
  </div>

  <audio id="audio-player" autoplay></audio>
  <div id="mute-badge">🔇 MUTE</div>

  <script type="module" src="./main.js"></script>
</body>
</html>
