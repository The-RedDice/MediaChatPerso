<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BordelBox — Options</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0e0e14;
      --surface: #16161f;
      --border:  #2a2a3a;
      --accent:  #ff3c6e;
      --green:   #00ff87;
      --text:    #e8e8f0;
      --muted:   #5a5a7a;
      --mono:    'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      padding: 24px;
      user-select: none;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .slider-val {
      font-size: 0.85rem;
      color: var(--text);
      min-width: 40px;
      text-align: right;
    }

    .shortcut-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.82rem;
      color: var(--green);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 28px;
    }

    button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    .btn-save   { background: var(--accent); color: #fff; box-shadow: 0 0 12px rgba(255,60,110,0.3); }
    .btn-cancel { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

    #status {
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--green);
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <h1>⚙️ BORDELBOX OPTIONS</h1>

  <div class="field">
    <label>Pseudo (identifiant sur le serveur)</label>
    <input type="text" id="pseudo" placeholder="monpseudo" maxlength="32">
  </div>

  <div class="field">
    <label>URL du serveur</label>
    <input type="url" id="serverUrl" placeholder="http://localhost:3000">
  </div>

  <div class="field">
    <label>Taille du message — <span id="messageSizeLabel">8</span>vw</label>
    <div class="slider-row">
      <input type="range" id="messageSize" min="3" max="25" step="0.5" value="8">
      <span class="slider-val" id="messageSizeVal">8vw</span>
    </div>
  </div>

  <div class="field">
    <label>Taille de la caption — <span id="captionSizeLabel">2.5</span>vw</label>
    <div class="slider-row">
      <input type="range" id="captionSize" min="1" max="10" step="0.1" value="2.5">
      <span class="slider-val" id="captionSizeVal">2.5vw</span>
    </div>
  </div>

  <div class="field" style="text-align: right;">
    <button class="btn-cancel" style="padding: 6px 12px; font-size: 0.75rem; flex: none; width: auto;" onclick="resetOverlayOptions()">🔄 Réinitialiser la taille/position</button>
  </div>

  <div class="field">
    <label>Taille des médias — <span id="mediaSizeLabel">80</span>%</label>
    <div class="slider-row">
      <input type="range" id="mediaSize" min="20" max="100" step="5" value="80">
      <span class="slider-val" id="mediaSizeVal">80%</span>
    </div>
  </div>

  <div class="field" style="display: flex; gap: 12px;">
    <div style="flex: 1;">
      <label>Position X (%) — <span id="posXLabel">50</span></label>
      <div class="slider-row">
        <input type="range" id="posX" min="0" max="100" step="1" value="50">
      </div>
    </div>
    <div style="flex: 1;">
      <label>Position Y (%) — <span id="posYLabel">50</span></label>
      <div class="slider-row">
        <input type="range" id="posY" min="0" max="100" step="1" value="50">
      </div>
    </div>
  </div>

  <div class="field">
    <label>Raccourci clavier — Toggle overlay</label>
    <input type="text" id="shortcut" value="Ctrl+O" placeholder="Ex: Ctrl+O" readonly>
  </div>

  <div class="btn-row">
    <button class="btn-cancel" onclick="closeWindow()">Annuler</button>
    <button class="btn-save"   onclick="saveOptions()">💾 Sauvegarder</button>
  </div>

  <div id="status"></div>

  <script src="./options.js"></script>
</body>
</html>
